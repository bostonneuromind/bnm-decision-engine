<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>훈련 프로토콜 - Decision Catcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
</head>
<body data-auth>

<header class="header">
  <h1>🩺 훈련 프로토콜</h1>
  <nav class="nav">
    <a href="/">Home</a>
    <a href="/clinician.html">새 환자</a>
    <a href="/result.html">평가 결과</a>
    <a href="/outcome.html">Outcome</a>
    <a href="/manual.html">매뉴얼</a>
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<div class="container">

  <div id="noData" class="alert alert-warning" style="display:none;">
    프로토콜 자료 ❌. <a href="/clinician.html">새 환자 평가</a>부터 시작하세요.
  </div>

  <div id="protocolRoot"></div>

  <div class="section no-print">
    <h2>회기 진행 자료</h2>
    <p>각 회기:</p>
    <ol style="padding-left:24px;">
      <li>시작 (5분): HRV 측정, 기분 체크</li>
      <li>카드 실행 (15-60분): 시스템 추천 카드 또는 임상가 override</li>
      <li>종료 (5분): HRV 재측정, OMR 응답</li>
    </ol>
    <p style="margin-top:16px;">4주 후 → <a href="/outcome.html" class="brand-color"><strong>Outcome 입력 + Re-routing</strong></a></p>
  </div>

</div>

<footer class="footer">
  <p>Boston Neuromind LLC · CNA v7.0.0</p>
</footer>

<script src="/decision.js"></script>
<script>
const result = State.load('assessment_result');

if (!result || !result.protocol_preview) {
  document.getElementById('noData').style.display = 'block';
} else {
  renderProtocol(result.protocol_preview, result.protocol_simulation);
}

function renderProtocol(p, sim) {
  const root = document.getElementById('protocolRoot');
  
  let html = `
    <div class="section">
      <h2>프로토콜 자료</h2>
      <div class="form-row">
        <div><strong>환자:</strong> ${p.patient_id}</div>
        <div><strong>영역:</strong> ${clinicalAxisKo(p.selected_axis)}</div>
        <div><strong>기간:</strong> ${p.target_duration_weeks}주</div>
        <div><strong>총 회기:</strong> ${p.sessions.length}회</div>
        <div><strong>진행 자료:</strong> ${p.weekly_progression}</div>
      </div>
    </div>
    
    <div class="section">
      <h2>주별 자료</h2>
      <table class="table">
        <thead><tr><th>회기</th><th>주차</th><th>요일</th><th>시간</th><th>카드</th></tr></thead>
        <tbody>
  `;
  
  p.sessions.forEach((s, i) => {
    const cards = s.cards.map(c => c.id).join(', ');
    const totalTime = s.cards.reduce((sum, c) => sum + (c.cost_minutes || 0), 0);
    html += `<tr>
      <td>${i + 1}</td>
      <td>W${s.week || Math.floor(i / (p.sessions.length / p.target_duration_weeks)) + 1}</td>
      <td>${s.day_of_week || '-'}</td>
      <td>${totalTime}분</td>
      <td>${cards}</td>
    </tr>`;
  });
  
  html += `</tbody></table></div>`;
  
  if (p.success_criteria) {
    html += `<div class="section">
      <h2>성공 기준</h2>
      <table class="table"><tbody>`;
    Object.entries(p.success_criteria).forEach(([k, v]) => {
      html += `<tr><td>${k}</td><td>≥ ${v}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }
  
  if (p.measurement_schedule) {
    html += `<div class="section">
      <h2>측정 자료</h2>
      <table class="table"><tbody>`;
    Object.entries(p.measurement_schedule).forEach(([week, measures]) => {
      html += `<tr><td>${week}</td><td>${(measures || []).join(', ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }
  
  if (sim) {
    html += `<div class="section" style="border-color:#C9444F;">
      <h2 style="color:#C9444F;">예상 효과 시뮬레이션 (v7)</h2>
      <p><strong>Uncertainty:</strong> ${(sim.uncertainty * 100).toFixed(0)}%</p>
      
      <h3>인지 5축 예상 변화</h3>
      <table class="table"><thead><tr><th>인지축</th><th>현재</th><th>예상</th><th>변화</th></tr></thead><tbody>`;
    Object.keys(sim.starting_cognitive).forEach(axis => {
      const before = sim.starting_cognitive[axis];
      const after = sim.projected_cognitive[axis];
      const delta = sim.cognitive_deltas[axis];
      html += `<tr>
        <td>${cognitiveAxisKo(axis)}</td>
        <td>L${before.toFixed(1)}</td>
        <td>L${after.toFixed(1)}</td>
        <td><strong>${delta >= 0 ? '+' : ''}${delta.toFixed(2)}</strong></td>
      </tr>`;
    });
    html += `</tbody></table>
      
      <h3>임상 5축 예상 변화</h3>
      <table class="table"><thead><tr><th>임상축</th><th>현재</th><th>예상</th><th>변화</th></tr></thead><tbody>`;
    Object.keys(sim.starting_clinical).forEach(axis => {
      const before = sim.starting_clinical[axis];
      const after = sim.projected_clinical[axis];
      const delta = sim.clinical_deltas[axis];
      html += `<tr>
        <td>${clinicalAxisKo(axis)}</td>
        <td>${before.toFixed(2)}</td>
        <td>${after.toFixed(2)}</td>
        <td><strong>${delta >= 0 ? '+' : ''}${delta.toFixed(3)}</strong></td>
      </tr>`;
    });
    html += `</tbody></table>
      
      <details style="margin-top:16px;">
        <summary style="cursor:pointer;">시뮬레이션 가정</summary>
        <ul style="padding-left:24px;margin-top:8px;color:#5a4a35;">`;
    sim.assumptions.forEach(a => html += `<li>${a}</li>`);
    html += `</ul></details></div>`;
  }
  
  root.innerHTML = html;
}
</script>
</body>
</html>
