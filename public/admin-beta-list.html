<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타 신청자 관리 — Decision Catcher Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f0eee9;color:#1a1a1a;min-height:100vh;padding:30px 20px}
.container{max-width:1400px;margin:0 auto}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.head h1{font-size:26px;color:#2a2018}
.head .sub{font-size:13px;color:#5a4a35;margin-top:4px}
.btn-refresh{padding:10px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-refresh:hover{background:#000}

.login-card{max-width:420px;margin:80px auto;background:#fff;border:2px solid #1a1a1a;border-radius:20px;padding:32px}
.login-card h2{font-size:20px;margin-bottom:16px;text-align:center}
.login-card input{width:100%;padding:12px 14px;border:2px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:12px}
.login-card button{width:100%;padding:14px;background:#C9444F;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login-card .err{background:#fee;color:#c00;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.login-card .err.show{display:block}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:2px solid #1a1a1a;border-radius:14px;padding:16px;text-align:center}
.stat-card .label{font-size:12px;color:#5a4a35;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:800;color:#2a2018}
.stat-card.total{background:#1a1a1a;color:#fff}
.stat-card.total .label{color:#aaa}
.stat-card.total .value{color:#fff}

.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:8px 14px;background:#fff;color:#5a4a35;border:1.5px solid #ddd;border-radius:999px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.filter-btn:hover{border-color:#C9444F}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.table-card{background:#fff;border:2px solid #1a1a1a;border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0eee9;padding:12px 10px;text-align:left;font-weight:800;color:#2a2018;border-bottom:2px solid #1a1a1a;font-size:12px;text-transform:uppercase;letter-spacing:0.3px}
td{padding:12px 10px;border-bottom:1px solid #eee;vertical-align:top}
tr:hover{background:#fafafa}

.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-pending{background:#f0eee9;color:#5a4a3
