<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부모 동의 항목 / Awaiting Parent Consent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#E8F1F8 0%,#BDD7E7 100%);color:#2E5A7A;min-height:100vh;padding:40px 20px;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;width:100%}
.card{background:#fff;border:2px solid #2E5A7A;border-radius:20px;padding:48px 32px;text-align:center}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:28px;color:#2E5A7A;margin-bottom:16px;line-height:1.2}
p{font-size:15px;color:#4A90C2;line-height:1.6;margin-bottom:12px}
.email-box{background:#E8F1F8;border:2px solid #7BAFD0;border-radius:12px;padding:20px;margin:24px 0;font-size:14px;color:#2E5A7A}
.btn{display:inline-block;background:#2E5A7A;color:#fff;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;margin-top:20px}
.lang-toggle{position:absolute;top:20px;right:20px}
.lang-toggle button{background:#fff;border:1.5px solid #BDD7E7;padding:8px 14px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px}
</style>
</head>
<body>
<div class="lang-toggle">
  <button id="langToggleBtn" data-i18n="lang_toggle">EN</button>
</div>
<div class="container">
  <div class="card">
    <div class="icon">📧</div>
    <h1 data-i18n="pending_title">부모님 동의 대기 중</h1>

    <p data-i18n="pending_assent_done">본인 Assent가 완료되었습니다.</p>

    <div class="email-box">
      <strong data-i18n="pending_email_sent">📨 부모님께 동의서 이메일을 전송했습니다.</strong>
      <br><br>
      <span data-i18n="pending_email_explain">부모님이 이메일의 링크를 클릭하고 동의서에 서명하시면 베타 참여가 확정됩니다.</span>
    </div>

    <p data-i18n="pending_contact">문의사항이 있으시면 support@neurocatchers.com 으로 연락주세요.</p>

    <a href="/" class="btn" data-i18n="pending_back_home">홈으로</a>
  </div>
</div>

<script src="/decision.js"></script>
</body>
</html>
