<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/bnm-lang-sync.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피드백 / Feedback — Decision Catcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f0eee9;color:#1a1a1a;min-height:100vh;padding:40px 20px}
.container{max-width:640px;margin:0 auto}
.lang-switch{text-align:right;margin-bottom:20px}
.lang-switch button{padding:8px 14px;border-radius:999px;background:#fff;border:1.5px solid #ccc;font-size:13px;cursor:pointer;font-family:inherit}
.head{text-align:center;margin-bottom:30px}
.badge{display:inline-block;background:#C9444F;color:#fff;padding:6px 16px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:16px}
h1{font-size:30px;color:#2a2018;line-height:1.2}
.card{background:#fff;border:2px solid #1a1a1a;border-radius:20px;padding:32px}
.field{margin-bottom:20px}
.field label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
.field select,.field textarea,.field input{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;background:#fafafa}
.field textarea{min-height:120px;resize:vertical}
.stars{display:flex;gap:8px;justify-content:center;margin:20px 0}
.star{font-size:36px;cursor:pointer;color:#ddd;transition:all 0.15s}
.star.active{color:#f59e0b}
.star:hover{transform:scale(1.1)}
.btn-submit{display:block;width:100%;padding:16px;background:#C9444F;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.btn-submit:disabled{background:#ccc}
.radio-group{display:flex;gap:10px}
.radio-option{flex:1;padding:14px;border:2px solid #ddd;border-radius:10px;cursor:pointer;text-align:center;background:#fafafa;font-weight:700;font-size:14px}
.radio-option.selected{border-color:#C9444F;background:#fff5f5;color:#C9444F}
.radio-option input{display:none}
.success{background:#efe;color:#080;padding:14px 18px;border-radius:8px;margin-top:14px;display:none}
.success.show{display:block}
.error{background:#fee;color:#c00;padding:10px 14px;border-radius:8px;margin-top:14px;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="lang-switch">
    <button id="langToggleBtn" data-i18n="lang_toggle">EN</button>
  </div>

  <div class="head">
    <div class="badge" data-i18n="fb_badge">베타 피드백</div>
    <h1 data-i18n="fb_title">사용 경험을 들려주세요</h1>
  </div>

  <div class="card">
    <div class="field">
      <label data-i18n="fb_rating_label">전체 만족도</label>
      <div class="stars" id="stars">
        <span class="star" data-rating="1">★</span>
        <span class="star" data-rating="2">★</span>
        <span class="star" data-rating="3">★</span>
        <span class="star" data-rating="4">★</span>
        <span class="star" data-rating="5">★</span>
      </div>
    </div>

    <div class="field">
      <label data-i18n="fb_category_label">카테고리</label>
      <select id="category">
        <option value="usability" data-i18n="fb_cat_usability">사용성</option>
        <option value="clarity" data-i18n="fb_cat_clarity">결과 명확도</option>
        <option value="recommendation" data-i18n="fb_cat_recommendation">추천 입력</option>
        <option value="bug" data-i18n="fb_cat_bug">버그/오류</option>
        <option value="other" data-i18n="fb_cat_other">기타</option>
      </select>
    </div>

    <div class="field">
      <label data-i18n="fb_recommend_label">동료에게 추천하시겠어요?</label>
      <div class="radio-group">
        <label class="radio-option" data-value="true">
          <input type="radio" name="recommend">
          <span data-i18n="fb_yes">네</span>
        </label>
        <label class="radio-option" data-value="false">
          <input type="radio" name="recommend">
          <span data-i18n="fb_no">아니오</span>
        </label>
      </div>
    </div>

    <div class="field">
      <label data-i18n="fb_comment_label">상세 의견 (선택)</label>
      <textarea id="comment" data-i18n-placeholder="fb_comment_ph" placeholder="자유롭게 의견을 박아주세요..."></textarea>
    </div>

    <button class="btn-submit" id="submitBtn" data-i18n="fb_submit_btn">입력</button>

    <div class="success" id="successMsg"></div>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script src="/decision.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const signupId = params.get('signup_id');
const urlLang = params.get('lang');
if (urlLang && (urlLang === 'ko' || urlLang === 'en')) {
  setLang(urlLang);
}

let rating = 0;
document.querySelectorAll('.star').forEach(star => {
  star.addEventListener('click', () => {
    rating = parseInt(star.dataset.rating);
    document.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < rating);
    });
  });
});

let recommend = null;
document.querySelectorAll('.radio-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    recommend = opt.dataset.value === 'true';
  });
});

document.getElementById('submitBtn').addEventListener('click', async () => {
  const errEl = document.getElementById('errorMsg');
  const sucEl = document.getElementById('successMsg');
  errEl.classList.remove('show');
  sucEl.classList.remove('show');

  if (rating === 0) {
    errEl.textContent = t('fb_no_rating_err');
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        signup_id: signupId,
        rating: rating,
        category: document.getElementById('category').value,
        comment: document.getElementById('comment').value.trim(),
        would_recommend: recommend,
        language: getLang(),
        page_url: document.referrer || null,
      })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error');

    sucEl.textContent = t('fb_success');
    sucEl.classList.add('show');
    btn.style.display = 'none';
  } catch (err) {
    errEl.textContent = t('fb_err_prefix') + ' ' + err.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
