<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/bnm-lang-sync.js"></script>
<meta charset="UTF-8">
<title>평가 결과 - Decision Catcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
</head>
<body data-auth>

<header class="header">
  <h1>🩺 <span data-i18n="result_page_title">평가 결과</span></h1>
  <nav class="nav">
    <a href="/" data-i18n="home">Home</a>
    <a href="/clinician.html" data-i18n="new_client">새 클라이언트</a>
    <a href="/protocol.html" data-i18n="btn_protocol">프로토콜</a>
    <a href="/outcome.html" data-i18n="outcome">4주 Outcome</a>
    <a href="/manual.html" data-i18n="manual">매뉴얼</a>
    <a href="#" id="logoutBtn" data-i18n="logout">Logout</a>
    <button id="langToggleBtn" class="lang-btn" data-i18n="lang_toggle">EN</button>
  </nav>
</header>

<div class="container">

  <div id="noData" class="alert alert-warning" style="display:none;">
    <span data-i18n="no_data_msg">평가 항목 없음.</span>
    <a href="/clinician.html" data-i18n="no_data_link">새 클라이언트 평가</a>
    <span data-i18n="no_data_continue">를 시작해주세요.</span>
  </div>

  <div id="resultsRoot"></div>

  <div class="section no-print">
    <h2 data-i18n="next_steps_h">다음 단계</h2>
    <a href="/protocol.html" class="btn btn-primary" data-i18n="btn_protocol_sim">프로토콜 자료 + 시뮬레이션 자료</a>
    &nbsp;
    <button onclick="window.print()" class="btn btn-secondary" data-i18n="btn_save_pdf">PDF 저장</button>
    &nbsp;
    <a href="/clinician.html" class="btn btn-secondary" data-i18n="new_client">새 클라이언트</a>
  </div>

</div>

<footer class="footer">
  <p data-i18n="footer_company">Boston Neuromind LLC · CNA v7.0.0</p>
</footer>

<script src="/decision.js"></script>
<script>
const result = State.load('assessment_result');
const input = State.load('assessment_input');

if (!result) {
  document.getElementById('noData').style.display = 'block';
} else {
  renderResults(result, input);
}

function renderResults(r, input) {
  const root = document.getElementById('resultsRoot');
  const a = r.assessment;
  const d = r.decision;
  const sim = r.protocol_simulation;

  const lang = getLang();
  const locale = lang === 'en' ? 'en-US' : 'ko-KR';

  let html = '';

  // Header info
  html += `
    <div class="section">
      <h2>${t('client_label')} ${a.clinical_report.patient_id} — ${new Date().toLocaleString(locale)}</h2>
      <p><strong>${t('selected_area_label')}</strong> ${clinicalAxisKo(input.primary_clinical_axis)} |
         <strong>${t('motiv_label')}</strong> ${input.motivation.toFixed(1)} |
         <strong>${t('session_label')}</strong> ${input.n_sessions}</p>
    </div>
  `;

  // Safety alerts
  if (a.safety_flags && a.safety_flags.length > 0) {
    html += `<div class="section" style="border-color:#C9444F;border-width:3px;">
      <h2 style="color:#C9444F;">⚠️ ${t('safety_h')} — ${a.safety_flags.length}${t('safety_count_suffix')}</h2>`;
    a.safety_flags.forEach(f => {
      html += `<div class="alert alert-danger">
        <strong>${f.flag_type}</strong> (${t('severity_label')} ${f.severity})<br>
        ${t('triggered_label')} ${f.triggered_by}<br>
        ${t('action_label')} ${f.immediate_action}
      </div>`;
    });
    if (a.imminent_safety) {
      html += `<p style="font-weight:700;color:#C9444F;">${t('imminent_warning')}</p>`;
    }
    html += `</div>`;
  }

  // 1. Fischer 5축
  html += `<div class="section">
    <h2>${t('section1_h')}</h2>`;
  const cog = input.cognitive_levels;
  Object.keys(cog).forEach(axis => {
    const level = cog[axis];
    const pct = ((level - 7) / 6) * 100;
    html += `
      <div style="margin:12px 0;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <strong>${cognitiveAxisKo(axis)}</strong>
          <span>L${level.toFixed(1)}</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;">${pct.toFixed(0)}%</div></div>
      </div>
    `;
  });
  html += `</div>`;

  // 2. 임상 5축 예측표
  html += `<div class="section">
    <h2>${t('section2_h')}</h2>
    <table class="table">
      <thead><tr><th>${t('col_area')}</th><th>${t('col_score')}</th><th>${t('col_tier')}</th><th>${t('col_priority')}</th><th>${t('col_top_cog')}</th></tr></thead>
      <tbody>`;
  const axesList = Object.entries(a.clinical_report.axes).sort((x, y) => x[1].priority - y[1].priority);
  axesList.forEach(([axis, data]) => {
    const tier = scoreTier(data.score);
    const topCog = Object.entries(data.contributing_cognitive || {}).sort((x, y) => Math.abs(y[1]) - Math.abs(x[1]))[0];
    const topCogStr = topCog ? `${cognitiveAxisKo(topCog[0])} (${topCog[1] >= 0 ? '+' : ''}${topCog[1].toFixed(2)})` : '-';
    html += `<tr>
      <td><strong>${clinicalAxisKo(axis)}</strong></td>
      <td>${data.score.toFixed(2)}</td>
      <td><span class="score-badge ${tier.class}">${tier.name}</span></td>
      <td>#${data.priority}</td>
      <td>${topCogStr}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  // 3. DDE
  const dde = a.differential_diagnosis;
  html += `<div class="section" style="border-color:#C9444F;">
    <h2 style="color:#C9444F;">${t('section3_h')}</h2>
    <p><strong>${t('primary_label')}</strong> <span class="brand-color">${diagnosisKo(dde.primary_diagnosis || 'unknown')}</span></p>
    <p><strong>${t('secondary_label')}</strong> ${dde.secondary_diagnoses.map(diagnosisKo).join(', ') || t('none_text')}</p>
    <p><strong>${t('comorbidity_pattern_label')}</strong> ${dde.comorbidity_pattern || t('single_dx')}
       ${dde.comorbidity_pattern ? `${t('coverage_text_pre')}${(dde.comorbidity_coverage * 100).toFixed(0)}${t('coverage_text_post')}` : ''}</p>
    <p><strong>${t('confidence_label')}</strong> ${(dde.diagnostic_confidence * 100).toFixed(0)}%</p>
    <p><strong>${t('treatment_rationale_label')}</strong> ${dde.treatment_rationale}</p>`;

  if (dde.flagged_for_review) {
    html += `<div class="alert alert-warning"><strong>${t('flagged_review_label')}</strong><ul style="margin-left:20px;">`;
    dde.review_reasons.forEach(r => html += `<li>${r}</li>`);
    html += `</ul></div>`;
  }

  html += `<h3>${t('dx_distribution_h')}</h3>`;
  dde.hypotheses.forEach(h => {
    const cls = h.is_primary ? 'primary' : (h.is_comorbid ? 'secondary' : '');
    const marker = h.is_primary ? t('primary_marker') : (h.is_comorbid ? t('secondary_marker') : '  ');
    html += `
      <div class="dx-card ${cls}">
        <div class="dx-header">
          <div>
            <span class="dx-name">${marker}${h.name_ko}</span>
          </div>
          <div class="dx-posterior">${(h.posterior_probability * 100).toFixed(0)}%</div>
        </div>
        <div class="dx-matches">
          <div class="dx-match-item">
            <div class="dx-match-label">${t('symptom_match_label')}</div>
            <div class="dx-match-value">${(h.symptom_match * 100).toFixed(0)}%</div>
          </div>
          <div class="dx-match-item">
            <div class="dx-match-label">${t('cognitive_match_label')}</div>
            <div class="dx-match-value">${(h.cognitive_match * 100).toFixed(0)}%</div>
          </div>
          <div class="dx-match-item">
            <div class="dx-match-label">${t('biomarker_match_label')}</div>
            <div class="dx-match-value">${(h.biomarker_match * 100).toFixed(0)}%</div>
          </div>
          <div class="dx-match-item">
            <div class="dx-match-label">${t('temporal_match_label')}</div>
            <div class="dx-match-value">${(h.temporal_match * 100).toFixed(0)}%</div>
          </div>
        </div>
        ${h.differential_markers_met.length > 0 ?
          `<p style="margin-top:12px;color:#155724;font-size:13px;">${t('met_label')} ${h.differential_markers_met.join(', ')}</p>` : ''}
        ${h.differential_markers_missed.length > 0 && h.is_primary ?
          `<p style="color:#721c24;font-size:13px;">${t('missed_label')} ${h.differential_markers_missed.join(', ')}</p>` : ''}
      </div>
    `;
  });
  html += `</div>`;

  // 4. Comorbidity Decomposition
  const decomp = a.comorbidity_profile;
  html += `<div class="section">
    <h2>${t('section4_h')}</h2>
    <p><strong>${t('primary_source_label')}</strong> ${diagnosisKo(decomp.primary_source)} |
       <strong>${t('secondary_label')}</strong> ${decomp.secondary_sources.map(diagnosisKo).join(', ') || t('none_text')}</p>

    <h3>${t('decomp_axes_h')}</h3>`;

  Object.entries(decomp.decomposed_axes).forEach(([axis, data]) => {
    if (data.sources.length === 0) return;
    html += `
      <div style="background:#f0eee9;border-radius:12px;padding:16px;margin:12px 0;">
        <div style="display:flex;justify-content:space-between;">
          <strong>▶ ${data.clinical_axis_ko}</strong>
          <span>${t('score_word')} ${data.total_score.toFixed(2)} (${t('impairment_word')} ${data.total_impairment.toFixed(2)}, ${t('explanation_word')} ${(data.sources_explanation * 100).toFixed(0)}%)</span>
        </div>
        <table class="table" style="margin-top:12px;">
          <tbody>`;
    data.sources.forEach(s => {
      const m = s.primary_pathway ? '★' : '•';
      html += `<tr>
        <td>${m} ${diagnosisKo(s.source_id)}</td>
        <td>${t('contribution_word')} ${s.contribution.toFixed(3)}</td>
        <td>${t('posterior_word')} ${(s.posterior_prob * 100).toFixed(0)}%</td>
      </tr>`;
    });
    html += `</tbody></table>
        <p style="margin-top:8px;font-size:13px;color:#5a4a35;">${t('treatment_target_word')} <strong>${data.treatment_target}</strong> | ${t('residual_word')} ${data.residual.toFixed(3)}</p>
      </div>`;
  });

  html += `<h3>${t('intervention_priority_h')}</h3><ol style="padding-left:24px;">`;
  decomp.intervention_priority.forEach(p => {
    html += `<li><strong>${diagnosisKo(p.source)}</strong> → ${t('primary_impact_label')} ${clinicalAxisKo(p.target_clinical_axis)}<br>
              <small style="color:#5a4a35;">${p.rationale}</small></li>`;
  });
  html += `</ol></div>`;

  // 5. Intervention Ranking
  const rank = a.intervention_ranking;
  html += `<div class="section">
    <h2>${t('section5_h')}</h2>
    <p style="color:#5a4a35;">${rank.rationale}</p>
    <table class="table">
      <thead><tr><th>${t('col_rank')}</th><th>${t('col_cog_axis')}</th><th>${t('col_level_change')}</th><th>${t('col_total_improvement')}</th><th>${t('col_primary_benefit')}</th></tr></thead>
      <tbody>`;
  rank.ranked_interventions.forEach(r => {
    html += `<tr>
      <td>#${r.rank}</td>
      <td>${r.axis_ko}</td>
      <td>L${r.current_level.toFixed(1)} → L${r.target_level.toFixed(1)}</td>
      <td>${r.expected_total_improvement >= 0 ? '+' : ''}${r.expected_total_improvement.toFixed(3)}</td>
      <td>${clinicalAxisKo(r.primary_beneficiary)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  // 6. Target Levels
  const targets = a.target_levels;
  if (targets && targets.status === 'computed') {
    html += `<div class="section">
      <h2>${t('section6_h_pre')}${clinicalAxisKo(targets.target_clinical_axis)}${t('section6_h_mid')}${targets.target_score}${t('section6_h_post')}</h2>
      <p style="color:#5a4a35;">${t('current_score_label')} ${targets.current_score.toFixed(2)} → ${t('target_score_label')} ${targets.target_score.toFixed(2)}</p>
      <table class="table">
        <thead><tr><th>${t('col_cog_axis')}</th><th>${t('col_current_level')}</th><th>${t('col_target_level')}</th><th>${t('col_delta')}</th><th>${t('col_feasibility')}</th></tr></thead>
        <tbody>`;
    Object.entries(targets.per_axis_recommendations).forEach(([axis, rec]) => {
      html += `<tr>
        <td>${rec.axis_ko}</td>
        <td>L${rec.current_level.toFixed(1)}</td>
        <td>${rec.target_level ? 'L' + rec.target_level.toFixed(1) : t('not_alone_text')}</td>
        <td>${rec.delta_needed ? '+' + rec.delta_needed.toFixed(1) : '-'}</td>
        <td>${rec.feasibility === 'feasible' ? t('feasible_text') : `${t('infeasible_text_pre')}${rec.max_achievable_score.toFixed(2)}${t('infeasible_text_post')}`}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // 7. 시스템 추천 카드
  html += `<div class="section">
    <h2>${t('section7_h')}</h2>
    ${d.emergency_phase_active ? `<div class="alert alert-warning">${t('emergency_phase_text')}</div>` : ''}
    ${d.diagnosis_aligned ? `<div class="alert alert-success">${t('dx_aligned_text')}</div>` : ''}
    <table class="table">
      <thead><tr><th>${t('col_rank')}</th><th>${t('col_card_id')}</th><th>${t('col_score')}</th><th>${t('col_description')}</th></tr></thead>
      <tbody>`;
  d.candidate_cards.slice(0, 3).forEach((sc, i) => {
    const txt = lang === 'en' ? (sc.card.text_en || sc.card.text_ko || '') : (sc.card.text_ko || sc.card.text_en || '');
    html += `<tr>
      <td>#${i + 1}</td>
      <td>${sc.card.id}</td>
      <td>${sc.score >= 0 ? '+' : ''}${sc.score.toFixed(4)}</td>
      <td>${txt}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  // 8. 프로토콜 미리보기
  if (r.protocol_preview) {
    const p = r.protocol_preview;
    html += `<div class="section">
      <h2>${t('section8_h_pre')}${p.target_duration_weeks}${t('section8_h_weeks')}${p.sessions.length}${t('section8_h_post')}</h2>
      <p><strong>${t('area_label')}</strong> ${p.selected_axis ? clinicalAxisKo(p.selected_axis) : clinicalAxisKo('attention')} |
         <strong>${t('progression_label')}</strong> ${p.weekly_progression || t('default_progression')}</p>
    </div>`;
  }

  // 9. 프로토콜 시뮬레이션
  if (sim) {
    html += `<div class="section">
      <h2>${t('section9_h_pre')}${sim.weeks}${t('section9_h_weeks')}${(sim.uncertainty * 100).toFixed(0)}${t('section9_h_post')}</h2>
      <h3>${t('expected_cog_change_h')}</h3>
      <table class="table"><thead><tr><th>${t('col_cog_axis')}</th><th>${t('col_now')}</th><th>${t('col_expected')}</th><th>${t('col_change')}</th></tr></thead><tbody>`;
    Object.keys(sim.starting_cognitive).forEach(axis => {
      const before = sim.starting_cognitive[axis];
      const after = sim.projected_cognitive[axis];
      const delta = sim.cognitive_deltas[axis];
      if (Math.abs(delta) > 0.01) {
        html += `<tr>
          <td>${cognitiveAxisKo(axis)}</td>
          <td>L${before.toFixed(1)}</td>
          <td>L${after.toFixed(1)}</td>
          <td>${delta >= 0 ? '+' : ''}${delta.toFixed(2)}</td>
        </tr>`;
      }
    });
    html += `</tbody></table>
      <h3>${t('expected_clin_change_h')}</h3>
      <table class="table"><thead><tr><th>${t('col_area')}</th><th>${t('col_now')}</th><th>${t('col_expected')}</th><th>${t('col_change')}</th></tr></thead><tbody>`;
    Object.keys(sim.starting_clinical).forEach(axis => {
      const before = sim.starting_clinical[axis];
      const after = sim.projected_clinical[axis];
      const delta = sim.clinical_deltas[axis];
      html += `<tr>
        <td>${clinicalAxisKo(axis)}</td>
        <td>${before.toFixed(2)}</td>
        <td>${after.toFixed(2)}</td>
        <td>${delta >= 0 ? '+' : ''}${delta.toFixed(3)}</td>
      </tr>`;
    });
    html += `</tbody></table>
      <details style="margin-top:16px;">
        <summary style="cursor:pointer;color:#5a4a35;">${t('sim_assumptions')}</summary>
        <ul style="margin-top:8px;padding-left:24px;color:#5a4a35;">`;
    sim.assumptions.forEach(a => html += `<li>${a}</li>`);
    html += `</ul></details></div>`;
  }

  root.innerHTML = html;
}
</script>
</body>
</html>
